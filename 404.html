<!DOCTYPE html>
<html>
  <head>
    <script>
      const path = window.location.pathname;

      // Only redirect if not already processed
      if (!window.location.search.includes("p=")) {
        window.location.replace(
          "/?p=" + path.replace(/\//g, "~and~")
        );
      }
    </script>
  </head>
  <body></body>
</html>
