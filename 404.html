<!DOCTYPE html>
<html>
  <head>
    <script>
      // prevent loop
      if (!window.location.search.includes("p=")) {
        const path = window.location.pathname;
        window.location.replace(
          "/?p=" + path.replace(/\//g, "~and~")
        );
      }
    </script>
  </head>
  <body></body>
</html>
